<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>HARP</title>
  </head>
  <body>
    <header>
      <span class="brand">HARP 🪉</span>
      <span id="rec-dot"></span>
      <button id="reanalyze" type="button" class="ghost" title="Re-run analysis on this project">↻ Analyze</button>
      <button id="open-dashboard" type="button" class="ghost">Dashboard ↗</button>
    </header>

    <section class="settings">
      <label>
        HARP server
        <input id="server-url" type="url" placeholder="http://localhost:4277" />
      </label>
      <label>Project</label>
      <div class="row">
        <select id="project-select"></select>
        <button id="refresh" type="button" title="Refresh projects">⟳</button>
      </div>
      <div class="row">
        <input id="new-project-name" type="text" placeholder="New project name" />
        <button id="create-project" type="button">Create</button>
      </div>
      <label class="check">
        <input id="auto-download" type="checkbox" />
        Download .har on stop
      </label>
      <label class="check">
        <input id="auto-ingest" type="checkbox" />
        Ingest to server on stop
      </label>
      <label class="check">
        <input id="auto-analyze" type="checkbox" />
        Analyze automatically after stop
      </label>
      <label>
        Analyze model
        <select id="provider-select">
          <option value="anthropic">Anthropic</option>
          <option value="openai">OpenAI</option>
          <option value="google">Google</option>
        </select>
      </label>
    </section>

    <button id="record" type="button" class="record">Record</button>
    <div id="status" class="status"></div>
    <div id="coverage" class="coverage"></div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
